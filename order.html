<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Foodie</title>

<link rel="stylesheet" href="Common.css">

<style>

/* PAGE WRAPPER */
.order-page { background:#f5f5f5; }

/* LAYOUT */
#checkout-container{
display:flex;
flex-wrap:wrap;
max-width:1200px;
margin:40px auto;
gap:20px;
}

#checkout-form, #order-summary-panel{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

#checkout-form{ flex:1 1 60%; }
#order-summary-panel{ flex:1 1 35%; }

/* INPUTS */
label{ margin-top:15px; display:block; font-weight:bold; }

input, select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

/* CART ITEMS */
.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

/* CARD FIELDS */
#card-fields{ display:none; }

/* TOAST */
#toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:#fff;
padding:15px 20px;
border-radius:8px;
opacity:0;
transition:0.4s;
}

#toast.show{ opacity:1; }

/* SUCCESS SCREEN */
#success-screen{
display:none;
text-align:center;
padding:80px 20px;
}

#success-screen h1{
color:green;
margin-bottom:20px;
}

/* MOBILE */
@media(max-width:900px){
#checkout-container{ flex-direction:column; }
}

/* Center the footer text */
    footer {
      text-align: center;
      padding: 20px 0;
      background-color: #f8f8f8;
      font-size: 16px;
    }

</style>

</head>

<body>

<div class="order-page">

<!-- HEADER -->
<header>
<div class="logo">Foodie</div>

<nav id="nav-links">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="menu.html">Menu</a>
<a href="order.html" class="active">Order Now</a>
<a href="contact.html">Contact</a>
</nav>

<div class="cart-icon" onclick="openCart()">
🛒 <span id="cart-count">0</span>
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>
</header>


<!-- CHECKOUT -->
<section id="checkout-container">

<div id="checkout-form">

<h1>Checkout</h1>

<form onsubmit="placeOrder(event)">

<label>Full Name</label>
<input type="text" required>

<label>Phone</label>
<input type="text" required>

<label>Address</label>
<input type="text" required>

<label>Delivery Time</label>
<input type="datetime-local" required>

<button class="btn">Place Order</button>

</form>

</div>


<div id="order-summary-panel">

<h2>Your Order</h2>
<div id="checkout-items"></div>
<strong>Total: $<span id="checkout-total">0</span></strong>

<h2>Payment</h2>

<select id="payment-method" onchange="toggleCard()">
<option value="cod">Cash on Delivery</option>
<option value="card">Card</option>
</select>

<div id="card-fields">

<label>Card Number</label>
<input type="text" id="card-number" placeholder="1234 5678 9012 3456">

<label>Expiry</label>
<input type="text" id="expiry" placeholder="MM/YY">

<label>CVV</label>
<input type="text" id="cvv" placeholder="123">

</div>

</div>

</section>


<!-- SUCCESS SCREEN -->
<div id="success-screen">
<h1>🎉 Order Successful!</h1>
<p>Your food is on the way 🚀</p>
<a href="index.html" class="btn">Back to Home</a>
</div>


<!-- CART -->
<div id="cart">
<h2>Your Cart</h2>
<ul id="cart-items"></ul>
<p><strong>Total: $<span id="cart-total">0</span></strong></p>
<button class="btn" onclick="closeCart()">Close</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

</div>

<!-- Footer -->
  <footer>
    <p class="footer-bottom">© 2026 Foodie Restaurant. All Rights Reserved.</p>
  </footer>

<script>

/* TOAST */
function showToast(msg){
let toast=document.getElementById("toast");
toast.innerText=msg;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),3000);
}

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCheckout(){

let container=document.getElementById("checkout-items");
container.innerHTML="";
let total=0;

if(cart.length===0){
container.innerHTML="Your cart is empty";
}

cart.forEach((item,i)=>{

container.innerHTML += `
<div class="cart-item">
<div>${item.name} ($${item.price}) x ${item.quantity}</div>
<div>
<button onclick="increaseQty(${i})">+</button>
<button onclick="decreaseQty(${i})">-</button>
</div>
</div>
`;

total += item.price * item.quantity;

});

document.getElementById("checkout-total").innerText=total;
}

/* UPDATE CART */
function updateCart(){

let list=document.getElementById("cart-items");
list.innerHTML="";
let total=0;

cart.forEach((item,i)=>{

list.innerHTML += `
<li>
${item.name} - $${item.price}
<br>Qty: ${item.quantity}
<button onclick="increaseQty(${i})">+</button>
<button onclick="decreaseQty(${i})">-</button>
</li>
`;

total += item.price * item.quantity;

});

document.getElementById("cart-total").innerText=total;
document.getElementById("cart-count").innerText=cart.length;

localStorage.setItem("cart",JSON.stringify(cart));
loadCheckout();
}

function increaseQty(i){ cart[i].quantity++; updateCart(); }
function decreaseQty(i){
cart[i].quantity>1 ? cart[i].quantity-- : cart.splice(i,1);
updateCart();
}

/* CART UI */
function openCart(){ document.getElementById("cart").style.right="0"; }
function closeCart(){ document.getElementById("cart").style.right="-350px"; }

/* MENU */
function toggleMenu(){
document.getElementById("nav-links").classList.toggle("show");
}

/* CARD TOGGLE */
function toggleCard(){
let method=document.getElementById("payment-method").value;
document.getElementById("card-fields").style.display =
method==="card" ? "block" : "none";
}

/* CARD AUTO FORMAT */
document.getElementById("card-number").addEventListener("input", function(e){
let val=e.target.value.replace(/\D/g,'').substring(0,16);
e.target.value = val.replace(/(.{4})/g,'$1 ').trim();
});

/* ORDER */
function placeOrder(e){

e.preventDefault();

if(cart.length===0){
showToast("Cart is empty!");
return;
}

let method=document.getElementById("payment-method").value;

if(method==="card"){

let card=document.getElementById("card-number").value.trim();
let exp=document.getElementById("expiry").value.trim();
let cvv=document.getElementById("cvv").value.trim();

if(!card || !exp || !cvv){
showToast("Fill card details!");
return;
}

if(card.replace(/\s/g,'').length<12){
showToast("Invalid card!");
return;
}

}

/* SUCCESS */
cart=[];
localStorage.removeItem("cart");

updateCart();
document.getElementById("checkout-container").style.display="none";
document.getElementById("success-screen").style.display="block";

}

/* INIT */
window.onload=function(){
updateCart();
loadCheckout();
};

</script>

</body>
</html>
