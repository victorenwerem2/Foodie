<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Foodie</title>
  <link rel="stylesheet" href="Common.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* =======================
       Page Layout
    ======================== */
    body {
      background: #f5f5f5;
      font-family: Arial, Helvetica, sans-serif;
      color: #333;
      line-height: 1.6;
    }

    section {
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      color: #8B0000;
    }

    /* =======================
       Contact Form
    ======================== */
    form {
      max-width: 600px;
      margin: 0 auto 50px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    form label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    form input,
    form textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    form textarea {
      resize: vertical;
      min-height: 120px;
    }

    form button.btn {
      background: #FFD700;
      color: black;
      font-weight: bold;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    form button.btn:hover {
      background: #e63946;
      color: white;
    }

    #feedbackMessage {
      display: none;
      color: green;
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }

    /* =======================
       Contact Details
    ======================== */
    .contact-details {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 50px;
    }

    .detail-box {
      flex: 1 1 250px;
      background: #f9f9f9;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s;
    }

    .detail-box:hover {
      transform: translateY(-5px);
    }

    .detail-box i {
      font-size: 28px;
      color: #8B0000;
      margin-bottom: 10px;
    }

    .detail-box p {
      font-size: 16px;
      margin-top: 5px;
      color: #333;
    }

    /* =======================
       Google Map
    ======================== */
    .map-container {
      max-width: 1000px;
      margin: 0 auto 50px auto;
      height: 400px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* =======================
       Header & Navigation
    ======================== */
    header {
      background: #8B0000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #FFD700;
      letter-spacing: 2px;
      z-index: 2;
    }

    #nav-links {
      display: flex;
      gap: 30px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover,
    nav a.active {
      color: #FFD700;
      border-bottom: 2px solid #FFD700;
      padding-bottom: 5px;
    }

    .menu-toggle {
      display: none;
      font-size: 28px;
      color: white;
      cursor: pointer;
      z-index: 2;
    }

    /* =======================
       Footer
    ======================== */
    footer {
      text-align: center;
      padding: 20px 0;
      background-color: #f8f8f8;
      font-size: 16px;
    }

    /* =======================
       Responsive
    ======================== */
    @media (max-width: 768px) {
      #nav-links {
        flex-direction: column;
        display: none;
        background: #8B0000;
        width: 100%;
        text-align: center;
        position: absolute;
        top: 70px;
        left: 0;
      }

      #nav-links.show {
        display: flex;
      }

      .menu-toggle {
        display: block;
      }

      .contact-details {
        flex-direction: column;
        align-items: center;
      }

      form {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo">Foodie</div>
    <nav id="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="menu.html">Menu</a>
      <a href="order.html">Order Now</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </header>

  <!-- Contact Section -->
  <section>
    <h1>Contact Us</h1>

    <!-- Contact Form -->
    <form id="contactForm">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your Name" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Your Email" required>

      <label for="message">Message</label>
      <textarea id="message" placeholder="Your Message" required></textarea>

      <button type="submit" class="btn">Send Message</button>

      <!-- Feedback Message -->
      <p id="feedbackMessage">Your message has been sent successfully! ✅</p>
    </form>

    <!-- Contact Details -->
    <div class="contact-details">
      <div class="detail-box">
        <i class="fas fa-map-marker-alt"></i>
        <p>123 Food Street, City, Country</p>
      </div>
      <div class="detail-box">
        <i class="fas fa-phone-alt"></i>
        <p>+1 234 567 890</p>
      </div>
      <div class="detail-box">
        <i class="fas fa-envelope"></i>
        <p>info@foodwebsite.com</p>
      </div>
    </div>

    <!-- Google Map -->
    <div class="map-container">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.086290598849!2d-122.42067968468103!3d37.77851937975798!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085808c0f8f0b0f%3A0x6a9a3b7a5f0e8c1!2s123%20Food%20Street!5e0!3m2!1sen!2sus!4v1679341234567!5m2!1sen!2sus"
        allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p class="footer-bottom">© 2026 Foodie Restaurant. All Rights Reserved.</p>
  </footer>

  <!-- Scripts -->
  <script>
    // Toggle mobile menu
    function toggleMenu() {
      const nav = document.getElementById("nav-links");
      nav.classList.toggle("show");
    }

    // Contact form feedback
    const contactForm = document.getElementById('contactForm');
    const feedbackMessage = document.getElementById('feedbackMessage');

    contactForm.addEventListener('submit', function (e) {
      e.preventDefault(); // prevent page reload

      // Show feedback
      feedbackMessage.style.display = 'block';

      // Reset form fields
      contactForm.reset();

      // Hide message after 5 seconds
      setTimeout(() => {
        feedbackMessage.style.display = 'none';
      }, 5000);
    });
  </script>
</body>

</html>
